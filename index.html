<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foco nos Estudos</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 20px;
    }
    h1 { color: #22c55e; }
    button {
      background: #22c55e;
      border: none;
      padding: 10px;
      color: white;
      margin-top: 10px;
    }
    textarea {
      width: 100%;
      height: 100px;
      margin-top: 10px;
    }
  </style>
</head>
<body>

<h1>📚 Foco nos Estudos</h1>

<h3>📝 Resumo de texto</h3>
<textarea id="texto" placeholder="Cole seu texto aqui..."></textarea>
<button onclick="resumir()">Gerar resumo</button>

<p id="resumo"></p>

<script>
function resumir() {
  let texto = document.getElementById("texto").value;
  let resumo = texto.substring(0, 150) + "...";
  document.getElementById("resumo").innerText = resumo;
}
</script>

</body>
</html>
